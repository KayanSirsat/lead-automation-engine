<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeadFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #161b27;
            --surface2: #1e2535;
            --border: #252d3d;
            --border2: #2e3a50;
            --text: #e8edf5;
            --text2: #8b95a8;
            --text3: #5a6478;
            --accent: #4f7ef8;
            --accent-h: #3d6ef0;
            --accent-dim: #1a2d5a;
            --green: #22c55e;
            --green-dim: #14331f;
            --amber: #f59e0b;
            --amber-dim: #2d2010;
            --red: #ef4444;
            --red-dim: #2d1010;
            --purple: #a855f7;
            --purple-dim: #2a1545;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --font: 'DM Sans', sans-serif;
            --mono: 'DM Mono', monospace;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            line-height: 1.5;
        }

        /* ── Layout ── */
        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }

        .sidebar-logo {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(79, 126, 248, 0.3);
        }

        .logo-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .logo-badge {
            font-size: 10px;
            background: var(--accent-dim);
            color: var(--accent);
            padding: 1px 6px;
            border-radius: 99px;
            font-weight: 500;
            margin-left: auto;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-section-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text3);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 8px 10px 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text2);
            font-size: 13.5px;
            font-weight: 400;
            transition: all 0.15s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent-dim);
            color: var(--accent);
            font-weight: 500;
        }

        .nav-item .icon {
            font-size: 15px;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .nav-item .badge {
            margin-left: auto;
            font-size: 10px;
            background: var(--surface2);
            color: var(--text3);
            padding: 1px 6px;
            border-radius: 99px;
            font-family: var(--mono);
        }

        .nav-item.active .badge {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border);
        }

        .sidebar-footer-info {
            font-size: 11px;
            color: var(--text3);
            text-align: center;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            height: 56px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            background: var(--surface);
            flex-shrink: 0;
        }

        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .topbar-sub {
            font-size: 12px;
            color: var(--text3);
        }

        .topbar-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            font-family: var(--font);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-h);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border2);
        }

        .btn-secondary:hover {
            background: var(--border2);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text2);
        }

        .btn-ghost:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-danger {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .card-tight {
            padding: 16px;
        }

        /* ── Stat cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -1px;
            color: var(--text);
            font-family: var(--mono);
        }

        .stat-sub {
            font-size: 11px;
            color: var(--text3);
        }

        .stat-card.accent {
            border-color: rgba(79, 126, 248, 0.3);
            background: linear-gradient(135deg, var(--surface) 0%, rgba(79, 126, 248, 0.05) 100%);
        }

        .stat-card.accent .stat-value {
            color: var(--accent);
        }

        .stat-card.green {
            border-color: rgba(34, 197, 94, 0.2);
        }

        .stat-card.green .stat-value {
            color: var(--green);
        }

        /* ── Form ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text2);
        }

        input,
        select {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 8px 12px;
            font-size: 13px;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s;
            width: 100%;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 126, 248, 0.1);
        }

        input::placeholder {
            color: var(--text3);
        }

        select option {
            background: var(--surface2);
        }

        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            min-height: 38px;
            cursor: text;
        }

        .tags-input.focused {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 126, 248, 0.1);
        }

        .tag {
            background: var(--accent-dim);
            color: var(--accent);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tag-remove {
            cursor: pointer;
            opacity: 0.6;
            font-size: 14px;
            line-height: 1;
        }

        .tag-remove:hover {
            opacity: 1;
        }

        .tags-input input {
            background: transparent;
            border: none;
            outline: none;
            padding: 0;
            font-size: 12px;
            min-width: 80px;
            flex: 1;
            color: var(--text);
            box-shadow: none;
        }

        /* ── Pipeline progress ── */
        .pipeline-stages {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .pipeline-stage {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .pipeline-stage:last-child {
            border-bottom: none;
        }

        .stage-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .stage-icon.waiting {
            background: var(--surface2);
            color: var(--text3);
            border: 1px solid var(--border2);
        }

        .stage-icon.active {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(79, 126, 248, 0.3);
            animation: pulse 1.5s infinite;
        }

        .stage-icon.done {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .stage-icon.failed {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.6
            }
        }

        .stage-body {
            flex: 1;
        }

        .stage-name {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text);
        }

        .stage-desc {
            font-size: 12px;
            color: var(--text3);
            margin-top: 2px;
        }

        .stage-count {
            font-size: 12px;
            color: var(--accent);
            font-family: var(--mono);
            margin-top: 4px;
        }

        /* ── Log ── */
        .log-box {
            background: #0a0d14;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--text2);
            max-height: 200px;
            overflow-y: auto;
            line-height: 1.8;
        }

        .log-line {
            display: flex;
            gap: 12px;
        }

        .log-time {
            color: var(--text3);
            flex-shrink: 0;
        }

        .log-msg {
            color: var(--text);
        }

        /* ── Table ── */
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--surface2);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        th {
            padding: 10px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border-bottom: 1px solid var(--border2);
            white-space: nowrap;
        }

        td {
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .td-mono {
            font-family: var(--mono);
            font-size: 12px;
        }

        .td-muted {
            color: var(--text3);
        }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-blue {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .badge-green {
            background: var(--green-dim);
            color: var(--green);
        }

        .badge-amber {
            background: var(--amber-dim);
            color: var(--amber);
        }

        .badge-red {
            background: var(--red-dim);
            color: var(--red);
        }

        .badge-purple {
            background: var(--purple-dim);
            color: var(--purple);
        }

        .badge-gray {
            background: var(--surface2);
            color: var(--text3);
        }

        /* ── Score pill ── */
        .score {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .score-high {
            background: var(--green-dim);
            color: var(--green);
        }

        .score-mid {
            background: var(--amber-dim);
            color: var(--amber);
        }

        .score-low {
            background: var(--surface2);
            color: var(--text3);
        }

        /* ── Modal ── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: fadeIn 0.15s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 14px;
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            animation: slideUp 0.2s;
        }

        @keyframes slideUp {
            from {
                transform: translateY(16px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        .modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 15px;
            font-weight: 600;
        }

        .modal-close {
            background: var(--surface2);
            border: none;
            color: var(--text2);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--text);
            background: var(--border2);
        }

        .modal-body {
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        /* ── Detail sections ── */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 13px;
            color: var(--text);
            word-break: break-word;
        }

        .detail-value a {
            color: var(--accent);
            text-decoration: none;
        }

        .detail-value a:hover {
            text-decoration: underline;
        }

        .audit-card {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
        }

        .audit-card-label {
            font-size: 11px;
            color: var(--text3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .audit-card-value {
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
        }

        /* ── Empty state ── */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 60px 24px;
            color: var(--text3);
        }

        .empty-icon {
            font-size: 36px;
            opacity: 0.4;
        }

        .empty-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text2);
        }

        .empty-sub {
            font-size: 13px;
            text-align: center;
            max-width: 320px;
        }

        /* ── Filter bar ── */
        .filter-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-bar input,
        .filter-bar select {
            width: auto;
            min-width: 140px;
        }

        .filter-count {
            font-size: 12px;
            color: var(--text3);
            margin-left: auto;
        }

        /* ── Jobs list ── */
        .job-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .job-row:hover {
            border-color: var(--border2);
        }

        .job-row.active-job {
            border-color: rgba(79, 126, 248, 0.4);
        }

        .job-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-running {
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: pulse 1.5s infinite;
        }

        .dot-done {
            background: var(--green);
        }

        .dot-failed {
            background: var(--red);
        }

        .dot-queued {
            background: var(--amber);
        }

        .job-info {
            flex: 1;
        }

        .job-title {
            font-size: 13.5px;
            font-weight: 500;
        }

        .job-meta {
            font-size: 11.5px;
            color: var(--text3);
            margin-top: 2px;
        }

        .job-counts {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text3);
            font-family: var(--mono);
        }

        .job-count-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
        }

        .job-count-val {
            color: var(--text);
            font-weight: 500;
        }

        /* ── Progress bar ── */
        .progress-bar {
            height: 3px;
            background: var(--surface2);
            border-radius: 99px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 99px;
            transition: width 0.4s;
        }

        .progress-fill.done {
            background: var(--green);
        }

        .progress-fill.failed {
            background: var(--red);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text3);
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        /* ── Section header ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
        }

        .section-sub {
            font-size: 12px;
            color: var(--text3);
        }

        /* ── Spinner ── */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Tooltip ── */
        .tooltip-wrap {
            position: relative;
            display: inline-flex;
        }

        .tooltip-wrap:hover .tooltip {
            opacity: 1;
            pointer-events: auto;
        }

        .tooltip {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #1a2030;
            border: 1px solid var(--border2);
            color: var(--text);
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            z-index: 50;
        }

        /* ── Niche dot ── */
        .niche-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const API = 'http://localhost:8000';

        // ── API helpers ────────────────────────────────────────────────────────────────
        async function apiFetch(path, opts = {}) {
            const res = await fetch(`${API}${path}`, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: res.statusText }));
                throw new Error(err.detail || res.statusText);
            }
            return res.json();
        }

        // ── Utility ────────────────────────────────────────────────────────────────────
        function scoreClass(s) {
            const n = parseInt(s);
            if (n >= 8) return 'score score-high';
            if (n >= 5) return 'score score-mid';
            return 'score score-low';
        }
        function statusBadge(status) {
            const map = { running: 'badge-blue', done: 'badge-green', failed: 'badge-red', queued: 'badge-amber' };
            return `badge ${map[status] || 'badge-gray'}`;
        }
        function dotClass(status) {
            const map = { running: 'dot-running', done: 'dot-done', failed: 'dot-failed', queued: 'dot-queued' };
            return `job-status-dot ${map[status] || ''}`;
        }
        function fmtTime(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        function fmtDate(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        function nicheColor(niche) {
            const colors = { cafe: '#4f7ef8', restaurant: '#22c55e', gym: '#a855f7', salon: '#f59e0b', architect: '#06b6d4', immigration: '#ec4899' };
            return colors[(niche || '').toLowerCase()] || '#8b95a8';
        }

        // ── Tags Input ──────────────────────────────────────────────────────────────────
        function TagsInput({ value, onChange, placeholder }) {
            const [focused, setFocused] = useState(false);
            const [input, setInput] = useState('');
            const ref = useRef();

            function addTag(tag) {
                tag = tag.trim();
                if (tag && !value.includes(tag)) onChange([...value, tag]);
                setInput('');
            }
            function removeTag(t) { onChange(value.filter(x => x !== t)); }

            function onKey(e) {
                if ((e.key === 'Enter' || e.key === ',') && input.trim()) {
                    e.preventDefault(); addTag(input);
                }
                if (e.key === 'Backspace' && !input && value.length) {
                    onChange(value.slice(0, -1));
                }
            }

            return (
                <div className={`tags-input ${focused ? 'focused' : ''}`} onClick={() => ref.current?.focus()}>
                    {value.map(t => (
                        <span key={t} className="tag">
                            {t}
                            <span className="tag-remove" onClick={e => { e.stopPropagation(); removeTag(t); }}>×</span>
                        </span>
                    ))}
                    <input
                        ref={ref} value={input}
                        onChange={e => setInput(e.target.value)}
                        onKeyDown={onKey}
                        onBlur={() => { setFocused(false); if (input.trim()) addTag(input); }}
                        onFocus={() => setFocused(true)}
                        placeholder={value.length === 0 ? placeholder : ''}
                    />
                </div>
            );
        }

        // ── Dashboard ──────────────────────────────────────────────────────────────────
        function Dashboard({ onNav }) {
            const [stats, setStats] = useState(null);
            const [jobs, setJobs] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                Promise.all([apiFetch('/leads/stats'), apiFetch('/jobs')])
                    .then(([s, j]) => { setStats(s); setJobs(j); })
                    .catch(() => { })
                    .finally(() => setLoading(false));
            }, []);

            const recentJobs = jobs.slice(0, 5);

            return (
                <div>
                    <div className="stats-grid">
                        <div className="stat-card accent">
                            <div className="stat-label">Total Leads</div>
                            <div className="stat-value">{loading ? '—' : (stats?.total_leads ?? 0)}</div>
                            <div className="stat-sub">in Lead Database</div>
                        </div>
                        <div className="stat-card green">
                            <div className="stat-label">Audited</div>
                            <div className="stat-value">{loading ? '—' : (stats?.audited ?? 0)}</div>
                            <div className="stat-sub">website audits done</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Pending Audit</div>
                            <div className="stat-value">{loading ? '—' : (stats?.pending_audit ?? 0)}</div>
                            <div className="stat-sub">awaiting analysis</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">No Website</div>
                            <div className="stat-value">{loading ? '—' : (stats?.no_website ?? 0)}</div>
                            <div className="stat-sub">high-value targets</div>
                        </div>
                    </div>

                    {stats?.by_niche && Object.keys(stats.by_niche).length > 0 && (
                        <div className="card" style={{ marginBottom: 24 }}>
                            <div className="section-header">
                                <div>
                                    <div className="section-title">Leads by Niche</div>
                                    <div className="section-sub">distribution across your pipeline</div>
                                </div>
                            </div>
                            <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                                {Object.entries(stats.by_niche).map(([niche, count]) => (
                                    <div key={niche} style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'var(--surface2)', borderRadius: 6, padding: '6px 12px' }}>
                                        <span className="niche-dot" style={{ background: nicheColor(niche) }} />
                                        <span style={{ fontSize: 13, fontWeight: 500, textTransform: 'capitalize' }}>{niche}</span>
                                        <span style={{ fontSize: 12, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>{count}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="section-header">
                        <div>
                            <div className="section-title">Recent Jobs</div>
                            <div className="section-sub">latest pipeline runs</div>
                        </div>
                        <button className="btn btn-secondary btn-sm" onClick={() => onNav('jobs')}>View all</button>
                    </div>

                    {recentJobs.length === 0 ? (
                        <div className="empty" style={{ padding: '40px 24px' }}>
                            <div className="empty-icon">⚡</div>
                            <div className="empty-title">No jobs yet</div>
                            <div className="empty-sub">Start a pipeline from Find Leads to generate your first batch</div>
                            <button className="btn btn-primary" onClick={() => onNav('find')}>Find Leads</button>
                        </div>
                    ) : (
                        recentJobs.map(job => <JobRow key={job.job_id} job={job} onClick={() => onNav('jobs')} />)
                    )}
                </div>
            );
        }

        // ── Find Leads ─────────────────────────────────────────────────────────────────
        function FindLeads({ onJobStarted }) {
            const [form, setForm] = useState({ niche: 'cafe', city: '', areas: [], limit: 50 });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const NICHES = ['cafe', 'restaurant', 'gym', 'salon', 'immigration consultant', 'architect', 'interior designer', 'ca firm', 'law firm', 'dentist', 'real estate', 'wedding photographer'];

            async function submit() {
                if (!form.city.trim()) { setError('City is required'); return; }
                setError(''); setLoading(true);
                try {
                    const job = await apiFetch('/jobs', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ niche: form.niche, city: form.city.trim(), areas: form.areas, limit: form.limit }),
                    });
                    onJobStarted(job);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            }

            return (
                <div style={{ maxWidth: 620 }}>
                    <div className="card" style={{ marginBottom: 16 }}>
                        <div style={{ marginBottom: 20 }}>
                            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 4 }}>Configure Lead Search</div>
                            <div style={{ fontSize: 12, color: 'var(--text3)' }}>Set your target market and the pipeline will scrape, enrich, and audit automatically.</div>
                        </div>

                        <div className="form-grid">
                            <div className="form-group">
                                <label>Niche</label>
                                <select value={form.niche} onChange={e => setForm(f => ({ ...f, niche: e.target.value }))}>
                                    {NICHES.map(n => <option key={n} value={n}>{n.charAt(0).toUpperCase() + n.slice(1)}</option>)}
                                </select>
                            </div>

                            <div className="form-group">
                                <label>City</label>
                                <input
                                    placeholder="e.g. Ahmedabad, Mumbai"
                                    value={form.city}
                                    onChange={e => setForm(f => ({ ...f, city: e.target.value }))}
                                />
                            </div>

                            <div className="form-group full">
                                <label>Areas <span style={{ color: 'var(--text3)', fontWeight: 400 }}>(optional — press Enter after each)</span></label>
                                <TagsInput
                                    value={form.areas}
                                    onChange={areas => setForm(f => ({ ...f, areas }))}
                                    placeholder="e.g. Satellite, Bopal, Navrangpura"
                                />
                            </div>

                            <div className="form-group">
                                <label>Lead Limit <span style={{ color: 'var(--text3)', fontWeight: 400 }}>(max 200)</span></label>
                                <input
                                    type="number" min={1} max={200}
                                    value={form.limit}
                                    onChange={e => setForm(f => ({ ...f, limit: Math.min(200, Math.max(1, parseInt(e.target.value) || 1)) }))}
                                />
                            </div>
                        </div>

                        {error && (
                            <div style={{ marginTop: 12, padding: '8px 12px', background: 'var(--red-dim)', border: '1px solid rgba(239,68,68,0.2)', borderRadius: 6, fontSize: 13, color: 'var(--red)' }}>
                                {error}
                            </div>
                        )}

                        <div style={{ marginTop: 20, display: 'flex', justifyContent: 'flex-end' }}>
                            <button className="btn btn-primary" onClick={submit} disabled={loading} style={{ minWidth: 140 }}>
                                {loading ? <><div className="spinner" />Starting…</> : '⚡ Run Pipeline'}
                            </button>
                        </div>
                    </div>

                    <div className="card card-tight" style={{ background: 'var(--surface2)' }}>
                        <div style={{ fontSize: 12, color: 'var(--text3)', lineHeight: 1.8 }}>
                            <strong style={{ color: 'var(--text2)' }}>Pipeline stages:</strong>{' '}
                            Query expansion (niche-aware) → Google Maps scraping → Zomato enrichment → Instagram discovery → Lead scoring → Write to Sheets → Website audit (AI) → Outreach draft
                        </div>
                    </div>
                </div>
            );
        }

        // ── Pipeline Status ────────────────────────────────────────────────────────────
        function PipelineStatus() {
            const [jobs, setJobs] = useState([]);
            const [selected, setSelected] = useState(null);
            const [detail, setDetail] = useState(null);
            const pollRef = useRef(null);

            useEffect(() => {
                loadJobs();
                return () => clearInterval(pollRef.current);
            }, []);

            useEffect(() => {
                clearInterval(pollRef.current);
                if (detail?.status === 'running' || detail?.status === 'queued') {
                    pollRef.current = setInterval(() => pollJob(detail.job_id), 2000);
                }
                return () => clearInterval(pollRef.current);
            }, [detail?.status]);

            async function loadJobs() {
                try {
                    const j = await apiFetch('/jobs');
                    setJobs(j);
                    if (j.length > 0 && !selected) {
                        setSelected(j[0].job_id);
                        setDetail(j[0]);
                    }
                } catch { }
            }

            async function pollJob(id) {
                try {
                    const j = await apiFetch(`/jobs/${id}`);
                    setDetail(j);
                    setJobs(prev => prev.map(x => x.job_id === id ? j : x));
                } catch { }
            }

            function selectJob(job) {
                setSelected(job.job_id);
                setDetail(job);
            }

            const STAGES = [
                { key: 'Scraping Google Maps', icon: '🗺️', desc: 'Searching and scraping business listings' },
                { key: 'Writing to Google Sheets', icon: '📋', desc: 'Saving leads to Lead Database' },
                { key: 'Running website audits', icon: '🔍', desc: 'AI analysis of website conversion quality' },
                { key: 'Generating outreach drafts', icon: '✉️', desc: 'Writing personalized cold email drafts' },
                { key: 'Enriching contact details', icon: '📧', desc: 'Finding owner emails via website, Instagram, and APIs' },
                { key: 'Complete', icon: '✅', desc: 'Pipeline finished' },
            ];

            function stageState(stageKey) {
                if (!detail) return 'waiting';
                if (detail.status === 'failed') return detail.stage === stageKey ? 'failed' : 'waiting';
                if (detail.stage === stageKey && detail.status === 'running') return 'active';
                const stageIdx = STAGES.findIndex(s => s.key === stageKey);
                const curIdx = STAGES.findIndex(s => s.key === detail.stage);
                if (detail.status === 'done') return 'done';
                if (stageIdx < curIdx) return 'done';
                return 'waiting';
            }

            function stageIcon(stageKey) {
                const state = stageState(stageKey);
                if (state === 'done') return '✓';
                if (state === 'active') return '⋯';
                if (state === 'failed') return '✕';
                return STAGES.find(s => s.key === stageKey)?.icon || '○';
            }

            const progress = detail ? (detail.status === 'done' ? 100 : detail.status === 'failed' ? 100 : (STAGES.findIndex(s => s.key === detail.stage) / STAGES.length) * 100) : 0;

            return (
                <div style={{ display: 'grid', gridTemplateColumns: '280px 1fr', gap: 16, height: '100%' }}>
                    {/* Jobs list */}
                    <div>
                        <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.6px', marginBottom: 10 }}>All Jobs</div>
                        {jobs.length === 0 ? (
                            <div className="empty" style={{ padding: 32 }}>
                                <div className="empty-title">No jobs yet</div>
                            </div>
                        ) : jobs.map(job => (
                            <div
                                key={job.job_id}
                                className={`job-row ${selected === job.job_id ? 'active-job' : ''}`}
                                style={{ padding: '12px 14px', marginBottom: 6 }}
                                onClick={() => selectJob(job)}
                            >
                                <div className={dotClass(job.status)} />
                                <div className="job-info">
                                    <div className="job-title" style={{ fontSize: 13 }}>{job.niche} · {job.city}</div>
                                    <div className="job-meta">{fmtDate(job.created_at)} · {job.limit} leads</div>
                                </div>
                                <div style={{ fontSize: 12, fontFamily: 'var(--mono)', color: 'var(--text3)' }}>{job.leads_found}</div>
                            </div>
                        ))}
                    </div>

                    {/* Detail */}
                    <div>
                        {!detail ? (
                            <div className="empty"><div className="empty-title">Select a job</div></div>
                        ) : (
                            <>
                                <div className="card" style={{ marginBottom: 12 }}>
                                    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 12 }}>
                                        <div>
                                            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 3, textTransform: 'capitalize' }}>
                                                {detail.niche} · {detail.city}
                                            </div>
                                            <div style={{ fontSize: 12, color: 'var(--text3)' }}>
                                                Job {detail.job_id.slice(0, 8)} · started {fmtDate(detail.created_at)}
                                            </div>
                                        </div>
                                        <span className={statusBadge(detail.status)} style={{ textTransform: 'capitalize' }}>{detail.status}</span>
                                    </div>

                                    <div className="progress-bar">
                                        <div className={`progress-fill ${detail.status}`} style={{ width: `${progress}%` }} />
                                    </div>

                                    <div style={{ display: 'flex', gap: 20, marginTop: 14 }}>
                                        {[['Found', detail.leads_found], ['Written', detail.leads_written], ['Audited', detail.leads_audited], ['Outreached', detail.leads_outreached], ['Enriched', detail.leads_enriched]].map(([label, val]) => (
                                            <div key={label}>
                                                <div style={{ fontSize: 10, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{label}</div>
                                                <div style={{ fontSize: 20, fontWeight: 600, fontFamily: 'var(--mono)', color: 'var(--text)' }}>{val}</div>
                                            </div>
                                        ))}
                                    </div>

                                    {detail.error && (
                                        <div style={{ marginTop: 12, padding: '8px 12px', background: 'var(--red-dim)', border: '1px solid rgba(239,68,68,0.2)', borderRadius: 6, fontSize: 12, color: 'var(--red)' }}>
                                            {detail.error}
                                        </div>
                                    )}
                                </div>

                                <div className="card" style={{ marginBottom: 12 }}>
                                    <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.6px', marginBottom: 14 }}>Pipeline Stages</div>
                                    <div className="pipeline-stages">
                                        {STAGES.map(s => (
                                            <div key={s.key} className="pipeline-stage">
                                                <div className={`stage-icon ${stageState(s.key)}`}>{stageIcon(s.key)}</div>
                                                <div className="stage-body">
                                                    <div className="stage-name">{s.key}</div>
                                                    <div className="stage-desc">{s.desc}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="card">
                                    <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.6px', marginBottom: 10 }}>Live Log</div>
                                    <div className="log-box">
                                        {detail.log.length === 0 ? (
                                            <div style={{ color: 'var(--text3)' }}>No log entries yet…</div>
                                        ) : detail.log.map((line, i) => {
                                            const [time, ...rest] = line.split(' ');
                                            return (
                                                <div key={i} className="log-line">
                                                    <span className="log-time">{fmtTime(time)}</span>
                                                    <span className="log-msg">{rest.join(' ')}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        // ── Job Row component ──────────────────────────────────────────────────────────
        function JobRow({ job, onClick }) {
            return (
                <div className={`job-row ${job.status === 'running' ? 'active-job' : ''}`} onClick={onClick}>
                    <div className={dotClass(job.status)} />
                    <div className="job-info">
                        <div className="job-title">{job.niche} · {job.city} {job.areas?.length ? `(${job.areas.join(', ')})` : ''}</div>
                        <div className="job-meta">{fmtDate(job.created_at)} · limit {job.limit}</div>
                        <div className="progress-bar" style={{ marginTop: 8, width: 200 }}>
                            <div className={`progress-fill ${job.status}`} style={{ width: job.status === 'done' ? '100%' : job.status === 'running' ? '50%' : '0%' }} />
                        </div>
                    </div>
                    <div className="job-counts">
                        {[['Found', job.leads_found], ['Written', job.leads_written], ['Outreached', job.leads_outreached], ['Enriched', job.leads_enriched]].map(([l, v]) => (
                            <div key={l} className="job-count-item">
                                <div className="job-count-val">{v}</div>
                                <div style={{ fontSize: 10, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.4px' }}>{l}</div>
                            </div>
                        ))}
                        <span className={statusBadge(job.status)} style={{ alignSelf: 'center', textTransform: 'capitalize' }}>{job.status}</span>
                    </div>
                </div>
            );
        }

        // ── Lead Detail Modal ──────────────────────────────────────────────────────────
        function LeadModal({ lead, onClose }) {
            const [audit, setAudit] = useState(null);
            const [loadingAudit, setLoadingAudit] = useState(true);
            const [draft, setDraft] = useState(null);
            const [generatingDraft, setGeneratingDraft] = useState(false);
            const [draftError, setDraftError] = useState('');
            const [findingEmail, setFindingEmail] = useState(false);
            const [emailError, setEmailError] = useState('');
            const [enrichedEmail, setEnrichedEmail] = useState(lead['Personal Email'] || null);

            useEffect(() => {
                const id = lead['Lead ID'];
                if (id) {
                    apiFetch(`/leads/${id}/audit`)
                        .then(setAudit)
                        .catch(() => setAudit(null))
                        .finally(() => setLoadingAudit(false));
                } else {
                    setLoadingAudit(false);
                }
            }, [lead]);

            async function generateDraft() {
                const id = lead['Lead ID'];
                if (!id) return;
                setGeneratingDraft(true);
                setDraftError('');
                try {
                    const result = await apiFetch(`/leads/${id}/outreach`, { method: 'POST' });
                    setDraft(result);
                } catch (e) {
                    setDraftError(e.message || 'Failed to generate draft');
                } finally {
                    setGeneratingDraft(false);
                }
            }

            async function findEmail() {
                const id = lead['Lead ID'];
                if (!id) return;
                setFindingEmail(true);
                setEmailError('');
                try {
                    const result = await apiFetch(`/leads/${id}/enrich`, { method: 'POST' });
                    setEnrichedEmail(result.email);
                } catch (e) {
                    setEmailError(e.message || 'Failed to find email');
                } finally {
                    setFindingEmail(false);
                }
            }

            const fields = [
                ['Company', lead['Company Name']],
                ['Niche', lead['Niche']],
                ['Location', lead['Location']],
                ['Phone', lead['Phone Number']],
                ['Lead Score', lead['Lead Score']],
                ['Google Rating', lead['Google Rating']],
                ['Lead Source', lead['Lead Source']],
                ['Tier', lead['Tier']],
                ['Revenue Level', lead['Est Revenue Level']],
            ];

            return (
                <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
                    <div className="modal">
                        <div className="modal-header">
                            <div>
                                <div className="modal-title">{lead['Company Name'] || 'Lead Detail'}</div>
                                <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 2 }}>
                                    Lead ID #{lead['Lead ID']}
                                </div>
                            </div>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>

                        <div className="modal-body">
                            {/* Lead info */}
                            <div>
                                <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 12 }}>Lead Info</div>
                                <div className="detail-grid">
                                    {fields.filter(([, v]) => v).map(([label, value]) => (
                                        <div key={label} className="detail-item">
                                            <div className="detail-label">{label}</div>
                                            <div className="detail-value">{value}</div>
                                        </div>
                                    ))}
                                    {lead['Website URL'] && (
                                        <div className="detail-item" style={{ gridColumn: '1 / -1' }}>
                                            <div className="detail-label">Website</div>
                                            <div className="detail-value"><a href={lead['Website URL']} target="_blank" rel="noopener">{lead['Website URL']}</a></div>
                                        </div>
                                    )}
                                    {lead['Instagram'] && (
                                        <div className="detail-item">
                                            <div className="detail-label">Instagram</div>
                                            <div className="detail-value">
                                                <a href={`https://instagram.com/${lead['Instagram']}`} target="_blank" rel="noopener">@{lead['Instagram']}</a>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="divider" />

                            {/* Audit */}
                            <div>
                                <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 12 }}>Website Audit</div>
                                {loadingAudit ? (
                                    <div style={{ color: 'var(--text3)', fontSize: 13 }}>Loading audit…</div>
                                ) : !audit ? (
                                    <div style={{ color: 'var(--text3)', fontSize: 13, padding: '12px', background: 'var(--surface2)', borderRadius: 6 }}>
                                        No audit available yet.{!lead['Website URL'] && ' (No website URL found for this lead)'}
                                    </div>
                                ) : (
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                                        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                                            <span className={scoreClass(audit['Audit Confidence'] || audit['confidence_score'])}>
                                                {audit['Audit Confidence'] || audit['confidence_score']}/10
                                            </span>
                                            <span style={{ fontSize: 12, color: 'var(--text3)' }}>confidence score</span>
                                        </div>
                                        {[
                                            ['Primary Website Weakness', audit['Primary Website Weakness']],
                                            ['Leverage Angle', audit['Leverage Angle']],
                                            ['Personalized Note', audit['Personalized note'] || audit['personalized_note']],
                                        ].filter(([, v]) => v).map(([label, value]) => (
                                            <div key={label} className="audit-card">
                                                <div className="audit-card-label">{label}</div>
                                                <div className="audit-card-value">{value}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <div className="divider" />

                            {/* Contact Enrichment */}
                            <div>
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                                    <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Contact Enrichment</div>
                                    {!enrichedEmail && (
                                        <button
                                            className="btn btn-secondary btn-sm"
                                            onClick={findEmail}
                                            disabled={findingEmail}
                                        >
                                            {findingEmail ? <><div className="spinner" style={{ width: 12, height: 12, borderWidth: 2 }} /> Finding…</> : '🔍 Find Email'}
                                        </button>
                                    )}
                                </div>
                                {emailError && (
                                    <div style={{ padding: '8px 12px', background: 'var(--red-dim)', border: '1px solid rgba(239,68,68,0.2)', borderRadius: 6, fontSize: 12, color: 'var(--red)', marginBottom: 10 }}>
                                        {emailError}
                                    </div>
                                )}
                                {!enrichedEmail && !findingEmail && !emailError && (
                                    <div style={{ color: 'var(--text3)', fontSize: 13, padding: '12px', background: 'var(--surface2)', borderRadius: 6 }}>
                                        No email found yet. Click Find Email to start search.
                                    </div>
                                )}
                                {enrichedEmail && (
                                    <div className="audit-card">
                                        <div className="audit-card-label">Email Address</div>
                                        <div className="audit-card-value">
                                            <a href={`mailto:${enrichedEmail}`}>{enrichedEmail}</a>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="divider" />

                            {/* Outreach Draft */}
                            <div>
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                                    <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Outreach Draft</div>
                                    {!draft && (
                                        <button
                                            className="btn btn-secondary btn-sm"
                                            onClick={generateDraft}
                                            disabled={generatingDraft}
                                        >
                                            {generatingDraft ? <><div className="spinner" style={{ width: 12, height: 12, borderWidth: 2 }} /> Generating…</> : '✉️ Generate Draft'}
                                        </button>
                                    )}
                                </div>
                                {draftError && (
                                    <div style={{ padding: '8px 12px', background: 'var(--red-dim)', border: '1px solid rgba(239,68,68,0.2)', borderRadius: 6, fontSize: 12, color: 'var(--red)', marginBottom: 10 }}>
                                        {draftError}
                                    </div>
                                )}
                                {!draft && !generatingDraft && !draftError && (
                                    <div style={{ color: 'var(--text3)', fontSize: 13, padding: '12px', background: 'var(--surface2)', borderRadius: 6 }}>
                                        No draft generated yet. Click Generate Draft to create a personalized cold email.
                                    </div>
                                )}
                                {draft && (
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                                        <div className="audit-card">
                                            <div className="audit-card-label">Subject Line</div>
                                            <div className="audit-card-value" style={{ fontWeight: 500 }}>{draft.subject_line}</div>
                                        </div>
                                        <div className="audit-card">
                                            <div className="audit-card-label">Email Body</div>
                                            <div className="audit-card-value" style={{ whiteSpace: 'pre-wrap' }}>{draft.email_body}</div>
                                        </div>
                                        <button
                                            className="btn btn-secondary btn-sm"
                                            style={{ alignSelf: 'flex-start' }}
                                            onClick={generateDraft}
                                            disabled={generatingDraft}
                                        >
                                            {generatingDraft ? <><div className="spinner" style={{ width: 12, height: 12, borderWidth: 2 }} /> Regenerating…</> : '✉️ Regenerate'}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="modal-footer">
                            <button className="btn btn-secondary" onClick={onClose}>Close</button>
                            {lead['Phone Number'] && (
                                <a href={`tel:${lead['Phone Number']}`} className="btn btn-primary">📞 Call</a>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ── Leads Table ────────────────────────────────────────────────────────────────
        function LeadsTable() {
            const [leads, setLeads] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [filterNiche, setFilterNiche] = useState('');
            const [filterCity, setFilterCity] = useState('');
            const [selected, setSelected] = useState(null);

            useEffect(() => {
                apiFetch('/leads')
                    .then(setLeads)
                    .catch(() => { })
                    .finally(() => setLoading(false));
            }, []);

            const niches = [...new Set(leads.map(l => l['Niche']).filter(Boolean))];
            const cities = [...new Set(leads.map(l => l['Location']).filter(Boolean))];

            const filtered = leads.filter(l => {
                if (filterNiche && l['Niche']?.toLowerCase() !== filterNiche.toLowerCase()) return false;
                if (filterCity && l['Location']?.toLowerCase() !== filterCity.toLowerCase()) return false;
                if (search) {
                    const q = search.toLowerCase();
                    return (l['Company Name'] || '').toLowerCase().includes(q) ||
                        (l['Location'] || '').toLowerCase().includes(q) ||
                        (l['Phone Number'] || '').includes(q);
                }
                return true;
            });

            return (
                <div>
                    <div className="filter-bar">
                        <input placeholder="🔍  Search name, city, phone…" value={search} onChange={e => setSearch(e.target.value)} style={{ minWidth: 220 }} />
                        <select value={filterNiche} onChange={e => setFilterNiche(e.target.value)}>
                            <option value="">All niches</option>
                            {niches.map(n => <option key={n} value={n}>{n}</option>)}
                        </select>
                        <select value={filterCity} onChange={e => setFilterCity(e.target.value)}>
                            <option value="">All cities</option>
                            {cities.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        <span className="filter-count">{filtered.length} of {leads.length} leads</span>
                    </div>

                    {loading ? (
                        <div className="empty"><div className="spinner" style={{ width: 24, height: 24, borderWidth: 3 }} /></div>
                    ) : filtered.length === 0 ? (
                        <div className="empty">
                            <div className="empty-icon">📋</div>
                            <div className="empty-title">{leads.length === 0 ? 'No leads yet' : 'No matching leads'}</div>
                            <div className="empty-sub">{leads.length === 0 ? 'Run a pipeline from Find Leads to get started' : 'Try adjusting your filters'}</div>
                        </div>
                    ) : (
                        <div className="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Company</th>
                                        <th>Niche</th>
                                        <th>Location</th>
                                        <th>Phone</th>
                                        <th>Rating</th>
                                        <th>Score</th>
                                        <th>Website</th>
                                        <th>Instagram</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.map(lead => (
                                        <tr key={lead['Lead ID']} onClick={() => setSelected(lead)} style={{ cursor: 'pointer' }}>
                                            <td className="td-mono td-muted">{lead['Lead ID']}</td>
                                            <td style={{ fontWeight: 500 }}>{lead['Company Name'] || '—'}</td>
                                            <td>
                                                {lead['Niche'] ? (
                                                    <span style={{ display: 'flex', alignItems: 'center' }}>
                                                        <span className="niche-dot" style={{ background: nicheColor(lead['Niche']) }} />
                                                        {lead['Niche']}
                                                    </span>
                                                ) : <span className="td-muted">—</span>}
                                            </td>
                                            <td className="td-muted">{lead['Location'] || '—'}</td>
                                            <td className="td-mono">{lead['Phone Number'] || <span className="td-muted">—</span>}</td>
                                            <td className="td-mono td-muted">{lead['Google Rating'] || '—'}</td>
                                            <td>
                                                {lead['Lead Score'] ? <span className={scoreClass(lead['Lead Score'])}>{lead['Lead Score']}</span> : <span className="td-muted">—</span>}
                                            </td>
                                            <td>
                                                {lead['Website URL']
                                                    ? <span className="badge badge-green">✓ Yes</span>
                                                    : <span className="badge badge-gray">None</span>}
                                            </td>
                                            <td>
                                                {lead['Instagram']
                                                    ? <span className="badge badge-purple">@{lead['Instagram']}</span>
                                                    : <span className="td-muted">—</span>}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {selected && <LeadModal lead={selected} onClose={() => setSelected(null)} />}
                </div>
            );
        }

        // ── App Shell ──────────────────────────────────────────────────────────────────
        function App() {
            const [page, setPage] = useState('dashboard');
            const [jobCount, setJobCount] = useState(0);

            useEffect(() => {
                apiFetch('/jobs').then(j => setJobCount(j.length)).catch(() => { });
            }, []);

            function handleJobStarted(job) {
                setJobCount(c => c + 1);
                setPage('pipeline');
            }

            const navItems = [
                { id: 'dashboard', icon: '◈', label: 'Dashboard' },
                { id: 'find', icon: '⚡', label: 'Find Leads' },
                { id: 'leads', icon: '◉', label: 'All Leads' },
                { id: 'pipeline', icon: '⟳', label: 'Pipeline Status', badge: jobCount > 0 ? String(jobCount) : null },
            ];

            const titles = {
                dashboard: { title: 'Dashboard', sub: 'Overview of your lead pipeline' },
                find: { title: 'Find Leads', sub: 'Configure and launch a new scraping job' },
                leads: { title: 'All Leads', sub: 'Browse and filter your entire lead database' },
                pipeline: { title: 'Pipeline Status', sub: 'Monitor running and completed jobs' },
            };

            const { title, sub } = titles[page] || titles.dashboard;

            return (
                <div className="app">
                    <aside className="sidebar">
                        <div className="sidebar-logo">
                            <div className="logo-mark">L</div>
                            <div className="logo-text">LeadFlow</div>
                            <span className="logo-badge">v1</span>
                        </div>

                        <nav className="sidebar-nav">
                            <div className="nav-section-label">Main</div>
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    className={`nav-item ${page === item.id ? 'active' : ''}`}
                                    onClick={() => setPage(item.id)}
                                >
                                    <span className="icon">{item.icon}</span>
                                    {item.label}
                                    {item.badge && <span className="badge">{item.badge}</span>}
                                </button>
                            ))}
                        </nav>

                        <div className="sidebar-footer">
                            <div className="sidebar-footer-info">Connected to Google Sheets</div>
                        </div>
                    </aside>

                    <main className="main">
                        <div className="topbar">
                            <div>
                                <div className="topbar-title">{title}</div>
                                <div className="topbar-sub">{sub}</div>
                            </div>
                            {page === 'find' ? null : (
                                <div className="topbar-actions">
                                    <button className="btn btn-primary btn-sm" onClick={() => setPage('find')}>⚡ New Job</button>
                                </div>
                            )}
                        </div>

                        <div className="content">
                            {page === 'dashboard' && <Dashboard onNav={setPage} />}
                            {page === 'find' && <FindLeads onJobStarted={handleJobStarted} />}
                            {page === 'leads' && <LeadsTable />}
                            {page === 'pipeline' && <PipelineStatus />}
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
